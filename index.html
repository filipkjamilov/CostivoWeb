<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Costivo – Cost Estimator for Craftsmen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #3D3010 0%, #1E1B14 50%, #111111 100%);
      background-attachment: fixed;
      color: #f2f2f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .container { max-width: 560px; text-align: center; }
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin: 0 auto 28px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .icon img { width: 100%; height: 100%; display: block; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
    p.tagline {
      font-size: 1.05rem;
      color: #aeaeb2;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 0.9rem;
      color: #aeaeb2;
      margin-bottom: 32px;
      backdrop-filter: blur(8px);
    }
    nav a {
      display: inline-block;
      margin: 0 12px;
      color: #F5C842;
      text-decoration: none;
      font-size: 0.95rem;
    }
    nav a:hover { text-decoration: underline; }
    footer {
      margin-top: 60px;
      font-size: 0.8rem;
      color: #636366;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><img src="icon.png" alt="Costivo" /></div>
    <h1>Costivo</h1>
    <p class="tagline">
      Fast, professional cost estimates for craftsmen.<br />
      Replace paper, Excel, and WhatsApp notes with a streamlined mobile solution.
    </p>
    <div class="badge">Available on the App Store · iOS</div>
    <nav>
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="mailto:appcostivo@gmail.com">Support</a>
    </nav>
    <footer>© 2026 Costivo. All rights reserved.</footer>
  </div>
</body>
</html>
